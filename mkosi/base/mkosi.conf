[Config]
MinimumVersion=26

[Distribution]
Architecture=x86-64
Distribution=ubuntu
Release=resolute
Repositories=universe

[Build]
Incremental=false
ToolsTree=default
WithNetwork=yes
EnvironmentFiles=mkosi.env

[Content]
Bootable=true
SourceDateEpoch=0
CleanPackageMetadata=yes
WithDocs=false
Timezone=UTC
Ssh=never
Autologin=true
Packages=
    apt
    bash
    ca-certificates
    cloud-init
    cloud-guest-utils
    dbus-broker
    dpkg
    grep
    gzip
    iproute2
    kmod
    libseccomp2
    linux-generic
    login
    mount
    polkitd
    sed
    sudo
    systemd
    systemd-boot
    systemd-boot-efi
    systemd-resolved
    systemd-sysv
    tzdata
    udev
    util-linux
KernelCommandLine=console=ttyS0 earlyprintk=serial systemd.condition-first-boot=no
MicrocodeHost=yes
KernelModulesInitrd=yes
KernelModulesInitrdInclude=
    dm-verity
    dm-bufio
    overlay
    virtio_blk
    virtio_pci
    virtio_net
    ext4

[Output]
Format=disk
Seed=d4f09d27-7e4e-4b1a-9c3a-deadbeef0001
SplitArtifacts=uki,roothash

[Validation]
Checksum=yes

[Runtime]
TPM=false
Firmware=uefi
VSock=false
